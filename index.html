<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PDFスライド同期ビューア</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    body { font-family: sans-serif; background: #fff; color: #000; text-align: center; }
    #pdf-canvas { border: 1px solid #000; margin: 20px 0; }
    .nav-btn { margin: 8px; padding: 8px 18px; font-size: 16px; }
    #page-info { font-size: 16px; margin: 0 12px; }
  </style>
</head>
<body>
  <h1>PDFスライド同期ビューア</h1>
  <button class="nav-btn" id="prev">前へ</button>
  <span id="page-info"></span>
  <button class="nav-btn" id="next">次へ</button>
  <br>
  <canvas id="pdf-canvas"></canvas>
  <div id="status"></div>
  <script>
    // === Firebase設定ここから ===
    const firebaseConfig = {
      apiKey: "ここにあなたの値",
      authDomain: "ここにあなたの値",
      databaseURL: "ここにあなたの値",
      projectId: "ここにあなたの値",
      storageBucket: "ここにあなたの値",
      messagingSenderId: "ここにあなたの値",
      appId: "ここにあなたの値"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const pageRef = db.ref("pdfPage");
    // === Firebase設定ここまで ===

    const url = "./images/lecture.pdf";
    let pdfDoc = null, pageNum = 1, totalPages = 1;

    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const pageInfo = document.getElementById('page-info');
    const statusDiv = document.getElementById('status');

    pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
      pdfDoc = pdfDoc_;
      totalPages = pdfDoc.numPages;
      pageRef.once("value").then(snap => {
        const val = snap.val();
        pageNum = (val && val >= 1 && val <= totalPages) ? val : 1;
        renderPage(pageNum);
      });
    }).catch(function(error) {
      statusDiv.textContent = "PDFの読み込みに失敗しました: " + error.message;
    });

    function renderPage(num) {
      pdfDoc.getPage(num).then(function(page) {
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        page.render({ canvasContext: ctx, viewport: viewport });
        pageInfo.textContent = `ページ ${num} / ${pdfDoc.numPages}`;
      });
    }

    function setPage(num) {
      pageRef.set(num);
    }

    document.getElementById('prev').onclick = function() {
      if (pageNum <= 1) return;
      setPage(pageNum - 1);
    };
    document.getElementById('next').onclick = function() {
      if (pageNum >= totalPages) return;
      setPage(pageNum + 1);
    };

    pageRef.on("value", snap => {
      const val = snap.val();
      if (val && val >= 1 && val <= totalPages && val !== pageNum) {
        pageNum = val;
        renderPage(pageNum);
      }
    });
  </script>
</body>
</html>

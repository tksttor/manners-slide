<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFスライド同期ビューア</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #pdf-canvas { max-width: 100vw; max-height: 100vh; display: block; }

    #presenter-ui { position: fixed; top: 0; left: 0; right: 0; z-index: 10; background: rgba(0,0,0,0.7); color: #fff; padding: 8px; display: none; flex-direction: column; align-items: center; gap: 6px; }
    #login-form { display: flex; gap: 6px; }
    #login-form input { padding: 6px; font-size: 14px; border-radius: 4px; border: none; }
    #login-form button { padding: 6px 14px; font-size: 14px; border-radius: 4px; border: none; cursor: pointer; }
    #controls { display: none; align-items: center; gap: 16px; }
    .nav-btn { padding: 8px 28px; font-size: 18px; cursor: pointer; border-radius: 4px; border: none; background: #fff; }
  </style>
</head>
<body>
  <div id="presenter-ui">
    <div id="login-form">
      <input type="email" id="email" placeholder="メールアドレス" />
      <input type="password" id="password" placeholder="パスワード" />
      <button onclick="login()">ログイン</button>
    </div>
    <div id="controls">
      <button class="nav-btn" id="prev">◀ 前へ</button>
      <button class="nav-btn" id="next">次へ ▶</button>
    </div>
  </div>

  <canvas id="pdf-canvas"></canvas>
  <div id="status" style="color:#fff; font-size:14px; padding:10px;"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBIQLHl5nmkmEfEUnRBrGSGAoYK6r9FIhk",
      authDomain: "manners-slide.firebaseapp.com",
      databaseURL: "https://manners-slide-default-rtdb.firebaseio.com",
      projectId: "manners-slide",
      storageBucket: "manners-slide.firebasestorage.app",
      messagingSenderId: "490855959579",
      appId: "1:490855959579:web:c53a03f3d105a510b4bcbe"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const pageRef = db.ref("pdfPage");

    const isPresenterMode = location.search.includes("presenter");
    const url = "./images/lecture.pdf";
    let pdfDoc = null, pageNum = 1, totalPages = 1;

    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');

    if (isPresenterMode) {
      document.getElementById('presenter-ui').style.display = 'flex';
    }

    pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
      pdfDoc = pdfDoc_;
      totalPages = pdfDoc.numPages;
      pageRef.once("value").then(snap => {
        const val = snap.val();
        pageNum = (val && val >= 1 && val <= totalPages) ? val : 1;
        renderPage(pageNum);
      });
    }).catch(function(error) {
      statusDiv.textContent = "PDFの読み込みに失敗しました: " + error.message;
    });

    function renderPage(num) {
      pdfDoc.getPage(num).then(function(page) {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const baseViewport = page.getViewport({ scale: 1 });
        const scale = Math.min(vw / baseViewport.width, vh / baseViewport.height);
        const viewport = page.getViewport({ scale });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        page.render({ canvasContext: ctx, viewport });
      });
    }

    function setPage(num) {
      pageRef.set(num);
    }

    document.getElementById('prev').onclick = function() {
      if (pageNum <= 1) return;
      setPage(pageNum - 1);
    };
    document.getElementById('next').onclick = function() {
      if (pageNum >= totalPages) return;
      setPage(pageNum + 1);
    };

    pageRef.on("value", snap => {
      const val = snap.val();
      if (val && val >= 1 && pdfDoc && val <= totalPages && val !== pageNum) {
        pageNum = val;
        renderPage(pageNum);
      }
    });

    auth.onAuthStateChanged(user => {
      if (!isPresenterMode) return;
      if (user) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';
      } else {
        document.getElementById('login-form').style.display = 'flex';
        document.getElementById('controls').style.display = 'none';
      }
    });

    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, password)
        .catch(err => alert("ログイン失敗: " + err.message));
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFスライド同期ビューア</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #pdf-canvas { max-width: 100vw; max-height: 100vh; display: block; }

    #controls {
      display: none;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100vw;
      height: 100vh;
      padding: 20px;
    }
    .nav-btn {
      width: 25vw;
      height: 60vh;
      font-size: 36px;
      cursor: pointer;
      border-radius: 16px;
      border: none;
      background: #fff;
      font-weight: bold;
      flex-shrink: 0;
    }
    .nav-btn:active { background: #ccc; }

    #preview-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #preview-canvas {
      display: block;
      border-radius: 8px;
    }
    #page-info { color: #fff; font-size: 22px; text-align: center; }
  </style>
</head>
<body>

  <div id="controls">
    <button class="nav-btn" id="prev">◀ 前へ</button>
    <div id="preview-area">
      <canvas id="preview-canvas"></canvas>
      <span id="page-info"></span>
    </div>
    <button class="nav-btn" id="next">次へ ▶</button>
  </div>

  <canvas id="pdf-canvas"></canvas>
  <div id="status" style="color:#fff; font-size:14px; padding:10px;"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBIQLHl5nmkmEfEUnRBrGSGAoYK6r9FIhk",
      authDomain: "manners-slide.firebaseapp.com",
      databaseURL: "https://manners-slide-default-rtdb.firebaseio.com",
      projectId: "manners-slide",
      storageBucket: "manners-slide.firebasestorage.app",
      messagingSenderId: "490855959579",
      appId: "1:490855959579:web:c53a03f3d105a510b4bcbe"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const pageRef = db.ref("pdfPage");

    const isPresenterMode = location.search.includes("presenter");
    const url = "./images/lecture.pdf";
    let pdfDoc = null, pageNum = 1, totalPages = 1;

    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const previewCanvas = document.getElementById('preview-canvas');
    const previewCtx = previewCanvas.getContext('2d');
    const statusDiv = document.getElementById('status');

    if (isPresenterMode) {
      canvas.style.display = 'none';
      document.getElementById('controls').style.display = 'flex';

      pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
        pdfDoc = pdfDoc_;
        totalPages = pdfDoc.numPages;
        pageRef.once("value").then(snap => {
          const val = snap.val();
          pageNum = (val && val >= 1 && val <= totalPages) ? val : 1;
          renderPreview(pageNum);
        });
      });

      pageRef.on("value", snap => {
        const val = snap.val();
        if (val) {
          pageNum = val;
          document.getElementById('page-info').textContent = `ページ ${val} / ${totalPages || ''}`;
          if (pdfDoc) renderPreview(val);
        }
      });

    } else {
      pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
        pdfDoc = pdfDoc_;
        totalPages = pdfDoc.numPages;
        pageRef.once("value").then(snap => {
          const val = snap.val();
          pageNum = (val && val >= 1 && val <= totalPages) ? val : 1;
          renderPage(pageNum);
        });
      }).catch(function(error) {
        statusDiv.textContent = "PDFの読み込みに失敗しました: " + error.message;
      });

      pageRef.on("value", snap => {
        const val = snap.val();
        if (val && val >= 1 && pdfDoc && val <= totalPages && val !== pageNum) {
          pageNum = val;
          renderPage(pageNum);
        }
      });
    }

    function renderPage(num) {
      pdfDoc.getPage(num).then(function(page) {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        const baseViewport = page.getViewport({ scale: 1 });
        const scale = Math.min(vw / baseViewport.width, vh / baseViewport.height) * dpr;
        const viewport = page.getViewport({ scale });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.width = (viewport.width / dpr) + 'px';
        canvas.style.height = (viewport.height / dpr) + 'px';
        page.render({ canvasContext: ctx, viewport });
      });
    }

    function renderPreview(num) {
      pdfDoc.getPage(num).then(function(page) {
        const baseViewport = page.getViewport({ scale: 1 });
        // ボタンと同じ高さ(60vh)からページ番号表示分を引いた高さに合わせる
        const maxH = window.innerHeight * 0.60 - 50;
        const maxW = window.innerWidth * 0.36;
        const scale = Math.min(maxW / baseViewport.width, maxH / baseViewport.height);
        const viewport = page.getViewport({ scale });
        previewCanvas.width = viewport.width;
        previewCanvas.height = viewport.height;
        previewCanvas.style.width = viewport.width + 'px';
        previewCanvas.style.height = viewport.height + 'px';
        page.render({ canvasContext: previewCtx, viewport });
      });
    }

    function setPage(num) {
      pageRef.set(num);
    }

    document.getElementById('prev').onclick = function() {
      if (pageNum <= 1) return;
      setPage(pageNum - 1);
    };
    document.getElementById('next').onclick = function() {
      if (pageNum >= totalPages) return;
      setPage(pageNum + 1);
    };
  </script>
</body>
</html>
